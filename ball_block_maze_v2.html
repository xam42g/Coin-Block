<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Ball Block Maze</title><style>html,body{margin:0;height:100%;overflow:hidden;background:#15131c;font-family:monospace;touch-action:none}canvas{display:block;width:100vw;height:100vh;background:#3a3048;image-rendering:pixelated}</style></head><body><canvas id="c"></canvas><script>
(()=>{const ca=document.getElementById('c'),x=ca.getContext('2d');let W,H,D=1,S=1,L={},zones=[];const G={cols:9,rows:9},B=[],balls=[],coins=[],texts=[],parts=[];let g={coins:0,kind:'block',placing:false,blocksBought:0,maxBlocks:1,ballCost:500,income:1,incomeCost:100,speed:1,speedCost:1000,crit:0,critCost:450,triple:0,tripleCost:650,bonus:0,pop:null,set:false,text:true,t:0,seed:7,seq:0,hand:true};function R(){D=Math.max(1,Math.min(2,devicePixelRatio||1));W=ca.width=innerWidth*D|0;H=ca.height=innerHeight*D|0;S=Math.min(W/1536,H/1024);let bs=Math.min(720*S,H-210*S,W*.58),cell=(bs/9)|0,gw=cell*9,gh=cell*9,bx=Math.max(150*S,(W-gw-520*S)/2),by=Math.max(170*S,150*S+(H-150*S-gh)/2);L={gx:bx,gy:by,c:cell,gw,gh,p:Math.max(22*S,cell*.28),sx:bx+gw+95*S,sy:by+95*S,bw:255*S,bh:114*S,gap:17*S,cx:bx+gw+325*S,cy:by+5*S}}addEventListener('resize',R);function rnd(){g.seed=(g.seed*1664525+1013904223)>>>0;return g.seed/4294967296}function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(n>=1e4?0:1)+'K':(Math.round(n*10)/10)+''}function txt(t,px,py,sz,col='#fff',al='center'){x.save();x.font=`900 ${sz*S}px monospace`;x.textAlign=al;x.textBaseline='middle';x.lineWidth=Math.max(3*S,sz*S*.12);x.strokeStyle='#242029';x.strokeText(t,px,py);x.fillStyle=col;x.fillText(t,px,py);x.restore()}function rect(px,py,w,h,f,st='#060606',lw=5*S){x.fillStyle=f;x.fillRect(px,py,w,h);x.lineWidth=lw;x.strokeStyle=st;x.strokeRect(px,py,w,h)}function coin(px,py,s=1){x.save();x.translate(px,py);x.scale(s,s);x.fillStyle='#ffc21c';x.beginPath();x.arc(0,0,16*S,0,7);x.fill();x.lineWidth=4*S;x.strokeStyle='#251900';x.stroke();x.fillStyle='#e79d00';x.beginPath();x.arc(0,0,8*S,0,7);x.fill();x.restore()}function addBall(){balls.push({x:L.gx+L.gw-20*S,y:L.gy+L.gh*.55,vx:-155*S,vy:(rnd()-.5)*220*S,r:9*S,skin:(rnd()*5)|0})}function reset(){B.length=balls.length=coins.length=texts.length=parts.length=0;Object.assign(g,{coins:0,kind:'block',placing:false,blocksBought:0,maxBlocks:1,ballCost:500,income:1,incomeCost:100,speed:1,speedCost:1000,crit:0,critCost:450,triple:0,tripleCost:650,bonus:0,pop:null,set:false,text:true,t:0,seq:0,hand:true});addBall()}function fl(t,px,py,c='#ffc21c',s=22){texts.push({t,x:px,y:py,vy:-42*S,life:1,c,s})}function burst(px,py,c='#ffc21c',n=7){for(let i=0;i<n;i++){let a=rnd()*7,sp=70*S+rnd()*160*S;parts.push({x:px,y:py,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:.25+rnd()*.25,c})}}function earn(v,px,py){let m=g.income*(performance.now()<g.bonus?2:1),cr=rnd()*100<g.crit,tr=rnd()*100<g.triple,val=v*m*(cr?2:1)*(tr?3:1);g.coins+=val;if(g.text)fl('+'+fmt(val),px,py,cr||tr?'#ff4fb2':'#ffc21c',cr||tr?30:22);for(let i=0;i<Math.min(9,2+val/3);i++)coins.push({x:px,y:py,vx:(rnd()-.5)*150*S,vy:-90*S-rnd()*120*S,life:.8})}function cell(px,py){let c=L.c,C=(px-L.gx)/c|0,R=(py-L.gy)/c|0;return C>=0&&R>=0&&C<9&&R<9?{C,R}:null}function at(C,R){return B.find(b=>b.C==C&&b.R==R)}function kind(n){if(n==1||n==2||n==5)return'tri';if(n>=8&&n%6==0)return't8';if(n>=9&&n%7==0)return't9';return'block'}function addBlock(C,R,k){B.push({id:++g.seq,C,R,k,rot:k=='tri'?(rnd()*4)|0:0,val:k=='t8'?8:k=='t9'?9:k=='block'?2:1,flash:0})}function spend(c){if(g.coins+1e-6<c){fl('NO COINS',L.sx+120*S,L.sy-25*S,'#f33');return 0}g.coins-=c;return 1}function buyBlock(){let c=g.blocksBought?Math.round(10*Math.pow(1.72,g.blocksBought-1)):0;if(!spend(c))return;g.blocksBought++;g.maxBlocks++;g.kind=kind(g.blocksBought);g.placing=true;g.hand=false;fl('PLACE',L.gx+L.gw/2,L.gy-18*S,'#55ff6b',28)}function buyBall(){if(spend(g.ballCost)){addBall();g.ballCost=Math.round(g.ballCost*2.65);fl('+BALL',L.sx+390*S,L.sy-25*S)}}function buyIncome(){if(spend(g.incomeCost)){g.income=Math.round((g.income+.1)*10)/10;g.incomeCost=Math.round(g.incomeCost*1.95)}}function buySpeed(){if(spend(g.speedCost)){g.speed=Math.round((g.speed+.02)*100)/100;g.speedCost=Math.round(g.speedCost*1.9);balls.forEach(b=>{b.vx*=1.02;b.vy*=1.02})}}function buyCrit(){if(spend(g.critCost)){g.crit=Math.round((g.crit+2.4)*10)/10;g.critCost=Math.round(g.critCost*1.9)}}function buyTriple(){if(spend(g.tripleCost)){g.triple=Math.round((g.triple+.8)*10)/10;g.tripleCost=Math.round(g.tripleCost*1.95)}}function zone(n,px,py,w,h,fn){zones.push({n,x:px,y:py,w,h,fn})}function inr(p,r){return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h}function pos(e){let r=ca.getBoundingClientRect(),p=e.touches?e.touches[0]:e;return{x:(p.clientX-r.left)*D,y:(p.clientY-r.top)*D}}ca.onpointerdown=e=>{let p=pos(e);if(g.pop){let y={x:W/2-190*S,y:H/2+135*S,w:180*S,h:85*S},n={x:W/2+20*S,y:H/2+135*S,w:180*S,h:85*S};if(inr(p,y)){if(g.pop.t=='coin')g.coins+=g.pop.v;else g.bonus=performance.now()+180000;g.pop=null}else if(inr(p,n))g.pop=null;return}for(let z of zones)if(inr(p,z)){z.fn();return}let ce=cell(p.x,p.y);if(ce){let b=at(ce.C,ce.R);if(g.kind=='trash'){if(b)B.splice(B.indexOf(b),1);return}if(g.placing||B.length<g.maxBlocks){if(!b){addBlock(ce.C,ce.R,g.kind);g.placing=false;burst(p.x,p.y,'#fff',10)}else if(b.k=='tri')b.rot=(b.rot+1)%4}}};function br(b){let c=L.c;return{x:L.gx+b.C*c+2*S,y:L.gy+b.R*c+2*S,w:c-4*S,h:c-4*S}}function hit(cx,cy,cr,r){let nx=Math.max(r.x,Math.min(cx,r.x+r.w)),ny=Math.max(r.y,Math.min(cy,r.y+r.h)),dx=cx-nx,dy=cy-ny;return dx*dx+dy*dy<cr*cr}function resolve(ball,b,r){if(b.k=='tri'){let d=[[1,-1],[-1,-1],[-1,1],[1,1]][b.rot],sp=Math.hypot(ball.vx,ball.vy)||180*S;ball.vx=d[0]*sp*.78;ball.vy=d[1]*sp*.78;return}if(b.k=='t9'){ball.vx*=1.18;ball.vy*=1.18}if(b.k=='t8'){if(Math.abs(ball.vx)>Math.abs(ball.vy))ball.vy+=(rnd()<.5?-1:1)*120*S;else ball.vx+=(rnd()<.5?-1:1)*120*S}let a=[Math.abs(ball.x+ball.r-r.x),Math.abs(r.x+r.w-ball.x+ball.r),Math.abs(ball.y+ball.r-r.y),Math.abs(r.y+r.h-ball.y+ball.r)],m=Math.min(...a);if(m==a[0]){ball.x=r.x-ball.r;ball.vx=-Math.abs(ball.vx)}else if(m==a[1]){ball.x=r.x+r.w+ball.r;ball.vx=Math.abs(ball.vx)}else if(m==a[2]){ball.y=r.y-ball.r;ball.vy=-Math.abs(ball.vy)}else{ball.y=r.y+r.h+ball.r;ball.vy=Math.abs(ball.vy)}}function upd(dt){g.t+=dt;for(let o of balls){o.x+=o.vx*dt*g.speed;o.y+=o.vy*dt*g.speed;if(o.x-o.r<L.gx){o.x=L.gx+o.r;o.vx=Math.abs(o.vx)}if(o.x+o.r>L.gx+L.gw){o.x=L.gx+L.gw-o.r;o.vx=-Math.abs(o.vx)}if(o.y-o.r<L.gy){o.y=L.gy+o.r;o.vy=Math.abs(o.vy)}if(o.y+o.r>L.gy+L.gh){o.y=L.gy+L.gh-o.r;o.vy=-Math.abs(o.vy)}for(let b of B){let r=br(b);if(hit(o.x,o.y,o.r,r)){resolve(o,b,r);b.flash=.12;earn(b.k=='tri'?1:b.k=='t8'?8:b.k=='t9'?12:b.val,o.x,o.y);burst(o.x,o.y,b.k=='t9'?'#d84bff':'#ffc21c',4)}}}for(let b of B)b.flash=Math.max(0,b.flash-dt);for(let i=coins.length-1;i>=0;i--){let o=coins[i];o.life-=dt;o.vy+=240*S*dt;o.x+=o.vx*dt;o.y+=o.vy*dt;if(o.life<=0)coins.splice(i,1)}for(let i=texts.length-1;i>=0;i--){let o=texts[i];o.life-=dt;o.y+=o.vy*dt;if(o.life<=0)texts.splice(i,1)}for(let i=parts.length-1;i>=0;i--){let o=parts[i];o.life-=dt;o.x+=o.vx*dt;o.y+=o.vy*dt;if(o.life<=0)parts.splice(i,1)}}function drawBoard(){let{x:xx}=x,{gx,gy,gw,gh,c,p}=L;rect(gx-p,gy-p,gw+2*p,gh+2*p,'#9fbec8','#2b2933',6*S);x.fillStyle='#bedbda';x.fillRect(gx,gy,gw,gh);x.strokeStyle='#352e43';x.lineWidth=4*S;for(let i=0;i<=9;i++){x.beginPath();x.moveTo(gx+i*c,gy);x.lineTo(gx+i*c,gy+gh);x.stroke();x.beginPath();x.moveTo(gx,gy+i*c);x.lineTo(gx+gw,gy+i*c);x.stroke()}x.fillStyle='rgba(255,255,255,.16)';x.fillRect(gx-p+8*S,gy-p+6*S,gw+2*p-16*S,8*S);x.fillRect(gx-p+gw/2,gy-p-70*S,38*S,70*S)}function drawTri(b,r){x.save();x.translate(r.x+r.w/2,r.y+r.h/2);x.rotate(b.rot*Math.PI/2);x.translate(-r.w/2,-r.h/2);x.fillStyle='#d93d54';x.beginPath();x.moveTo(0,0);x.lineTo(r.w,0);x.lineTo(r.w,r.h);x.closePath();x.fill();x.lineWidth=3*S;x.strokeStyle='#1e1a22';x.stroke();x.strokeStyle='#fff';x.lineWidth=5*S;x.beginPath();x.moveTo(r.w*.65,r.h*.35);x.lineTo(r.w*.78,r.h*.22);x.stroke();x.restore()}function drawBlocks(){for(let b of B){let r=br(b);if(b.k=='tri'){drawTri(b,r);continue}let col=b.k=='t8'?'#c53264':b.k=='t9'?'#8a36cf':b.val>=3?'#bd8708':'#00992a';rect(r.x,r.y,r.w,r.h,col,'#201b27',3*S);if(b.flash){x.fillStyle=`rgba(255,255,255,${b.flash*3})`;x.fillRect(r.x,r.y,r.w,r.h)}txt(String(b.val),r.x+r.w/2,r.y+r.h/2,24);x.fillStyle=b.k=='t8'?'#e33a67':b.k=='t9'?'#b348ff':'#00823b';x.beginPath();x.ellipse(r.x+r.w/2,r.y+r.h+15*S,10*S,30*S,0,0,7);x.fill();x.strokeStyle='#1e1a22';x.lineWidth=3*S;x.stroke();if(b.k=='t8'){x.beginPath();x.ellipse(r.x+r.w/2,r.y-10*S,10*S,30*S,0,0,7);x.fill();x.stroke()}if(b.k=='t9'){x.beginPath();x.ellipse(r.x+r.w+12*S,r.y+r.h/2,28*S,9*S,0,0,7);x.fill();x.stroke()}}}function drawBalls(){for(let b of balls){x.save();x.translate(b.x,b.y);x.rotate(g.t*4+b.skin);x.fillStyle=['#fff','#f15b42','#36b9e6','#f18c26','#fff'][b.skin]||'#fff';x.beginPath();x.arc(0,0,b.r,0,7);x.fill();x.lineWidth=3*S;x.strokeStyle='#1d1b22';x.stroke();x.strokeStyle='rgba(0,0,0,.22)';x.lineWidth=2*S;x.beginPath();x.moveTo(-b.r*.8,0);x.lineTo(b.r*.8,0);x.stroke();x.restore()}}function btn(title,mid,cost,px,py,w,h,on,fn){rect(px,py,w,h,on?'#078b21':'#3e3d3f');txt(title,px+w/2,py+25*S,29,'#eee');txt(mid,px+w/2,py+58*S,26,mid.includes('>')?'#19f03c':'#fff');txt('Buy',px+52*S,py+86*S,28,'#fff','left');coin(px+144*S,py+86*S,.75);txt(fmt(cost),px+178*S,py+86*S,27,g.coins>=cost?'#ffc21c':'#ef3333','left');zone(title,px,py,w,h,fn)}function shop(){zones=[];coin(L.cx,L.cy+18*S,1);txt(fmt(g.coins),L.cx+43*S,L.cy+18*S,42,'#ffc21c','left');rect(L.cx+250*S,L.cy-12*S,83*S,83*S,'#087f21');txt('⚙',L.cx+291*S,L.cy+30*S,45,'#ddd');zone('set',L.cx+250*S,L.cy-12*S,83*S,83*S,()=>g.set=!g.set);rect(L.sx-28*S,L.cy-10*S,130*S,70*S,'#0d91b1');txt('x2',L.sx+37*S,L.cy+12*S,25);txt('Bonus',L.sx+37*S,L.cy+40*S,25);zone('bonus',L.sx-28*S,L.cy-10*S,130*S,70*S,()=>g.pop=rnd()<.5?{t:'coin',v:Math.max(80,Math.round((g.coins+50)*4.5))}:{t:'x2'});let px=L.sx,py=L.sy,w=L.bw,h=L.bh,ga=L.gap,nb=g.blocksBought?Math.round(10*Math.pow(1.72,g.blocksBought-1)):0;btn('New Block','+1',nb,px,py,w,h,true,buyBlock);btn('New Ball',`${balls.length} > ${balls.length+1}`,g.ballCost,px+w+ga,py,w,h,false,buyBall);btn('Ball Income',`x${g.income.toFixed(1)} > x${(g.income+.1).toFixed(1)}`,g.incomeCost,px,py+h+ga,w,h,false,buyIncome);btn('Ball Speed',`${Math.round(g.speed*100)}% > ${Math.round((g.speed+.02)*100)}%`,g.speedCost,px+w+ga,py+h+ga,w,h,false,buySpeed);btn('Chance Crit',`${g.crit.toFixed(1)}% > ${(g.crit+2.4).toFixed(1)}%`,g.critCost,px,py+2*(h+ga),w,h,true,buyCrit);btn('Triple Income',`${g.triple.toFixed(1)}% > ${(g.triple+.8).toFixed(1)}%`,g.tripleCost,px+w+ga,py+2*(h+ga),w,h,true,buyTriple);rect(px+10*S,py+3*(h+ga)+180*S,88*S,88*S,'#8d8d8d');txt('🗑',px+54*S,py+3*(h+ga)+224*S,44,'#ddd');zone('trash',px+10*S,py+3*(h+ga)+180*S,88*S,88*S,()=>g.kind=g.kind=='trash'?'block':'trash');rect(px+w+ga,py+3*(h+ga)+160*S,w,82*S,'#4a5556');txt('Next Map',px+w+ga+w/2,py+3*(h+ga)+193*S,33,'#eee');coin(px+w+ga+80*S,py+3*(h+ga)+226*S,.8);txt('1.0M',px+w+ga+115*S,py+3*(h+ga)+226*S,30,'#f13737','left');if(g.placing||g.hand)hand(g.hand?L.sx+190*S:L.gx+L.gw*.5+Math.sin(g.t*4)*40*S,g.hand?L.sy+20*S:L.gy+L.gh*.3)}function hand(px,py){x.save();x.translate(px,py);x.rotate(-.55);x.fillStyle='#fff';x.strokeStyle='#090909';x.lineWidth=5*S;x.beginPath();x.ellipse(0,0,27*S,44*S,0,0,7);x.fill();x.stroke();x.beginPath();x.ellipse(-18*S,20*S,18*S,32*S,0,0,7);x.fill();x.stroke();x.restore()}function fx(){for(let p of parts){x.globalAlpha=Math.max(0,Math.min(1,p.life*3));x.fillStyle=p.c;x.fillRect(p.x-2*S,p.y-2*S,4*S,4*S)}x.globalAlpha=1;for(let c of coins){x.globalAlpha=Math.max(0,Math.min(1,c.life*2));coin(c.x,c.y,.55)}x.globalAlpha=1;for(let t of texts){x.globalAlpha=Math.max(0,Math.min(1,t.life));txt(t.t,t.x,t.y,t.s,t.c)}x.globalAlpha=1}function popup(){x.fillStyle='rgba(0,0,0,.62)';x.fillRect(0,0,W,H);txt('BONUS',W/2,H/2-165*S,56);rect(W/2-205*S,H/2-100*S,410*S,210*S,'#986832');if(g.pop.t=='coin'){txt('After watching a',W/2,H/2-45*S,25);txt('short promotional',W/2,H/2-10*S,25);txt('video, you receive',W/2,H/2+25*S,25);coin(W/2-38*S,H/2+65*S,.8);txt(fmt(g.pop.v),W/2+15*S,H/2+65*S,31,'#ffc21c','left')}else{txt('After watching the',W/2,H/2-35*S,26);txt('ad you will get',W/2,H/2,26);txt('x2 for 180 seconds',W/2,H/2+43*S,30,'#18ef3c')}rect(W/2-190*S,H/2+135*S,180*S,85*S,'#078919');txt('YES',W/2-100*S,H/2+177*S,42,'#022900');rect(W/2+20*S,H/2+135*S,180*S,85*S,'#b52b08');txt('NO',W/2+110*S,H/2+177*S,42,'#2b0900')}function settings(){x.fillStyle='rgba(0,0,0,.55)';x.fillRect(0,0,W,H);rect(W/2-260*S,H/2-250*S,520*S,500*S,'#956531');txt('Setting',W/2,H/2-190*S,50);txt('Music',W/2,H/2-105*S,32);rect(W/2-160*S,H/2-65*S,80*S,70*S,'#2385ad');txt('♪',W/2-120*S,H/2-30*S,42);rect(W/2-30*S,H/2-42*S,210*S,15*S,'#595959','#222',2*S);rect(W/2+35*S,H/2-62*S,38*S,55*S,'#2185ad');txt('Sound',W/2,H/2+45*S,32);rect(W/2-160*S,H/2+80*S,80*S,70*S,'#2385ad');txt('▸',W/2-120*S,H/2+115*S,42);rect(W/2-30*S,H/2+103*S,210*S,15*S,'#595959','#222',2*S);rect(W/2+55*S,H/2+83*S,38*S,55*S,'#2185ad');txt('Text coin',W/2,H/2+185*S,34);rect(W/2-160*S,H/2+165*S,65*S,65*S,g.text?'#239d32':'#555');if(g.text)txt('✓',W/2-128*S,H/2+198*S,40,'#0c5');rect(W/2-55*S,H/2+280*S,110*S,82*S,'#cf342d');txt('X',W/2,H/2+322*S,58);zone('close',W/2-55*S,H/2+280*S,110*S,82*S,()=>g.set=false);zone('text',W/2-160*S,H/2+165*S,65*S,65*S,()=>g.text=!g.text)}function draw(){x.clearRect(0,0,W,H);x.fillStyle='#3a3048';x.fillRect(0,0,W,H);drawBoard();drawBlocks();drawBalls();fx();shop();if(g.pop)popup();if(g.set)settings()}let last=performance.now();function loop(n){let dt=Math.min(.033,(n-last)/1000);last=n;upd(dt);draw();requestAnimationFrame(loop)}R();reset();requestAnimationFrame(loop)})();
